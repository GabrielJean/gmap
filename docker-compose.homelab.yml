# HomeLab Docker Compose for gmap
# This file should be placed in HomeLab/Docker/gmap/docker-compose.yml
#
# The application code and Dockerfile are now maintained in the GabrielJean/gmap repository.
# This compose file pulls the pre-built image from the Gitea registry.

services:
  gmap:
    image: gitea.docker-1.gwebs.ca/gabriel/gmap:latest
    env_file: .env
    container_name: gmap
    volumes:
      - /Apps/gmap:/app/data_runs
    restart: unless-stopped
